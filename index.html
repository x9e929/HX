<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#2c4c7c">
    <title>高频词汇本 · 自动轮播学习（默认开启）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-start: #f1f5f9; --bg-end: #e6edf6; --card-bg: rgba(255,255,255,0.97);
            --card-border: #eef3fc; --text-primary: #0A2E4A; --text-secondary: #4a627e;
            --text-soft: #54708f; --def-color: #1f3b62; --example-border: #7f9bc5;
            --btn-primary-bg: #2c4c7c; --btn-primary-hover: #1f3a60; --btn-outline-border: #cbdae9;
            --chip-bg: #eef3ff; --chip-color: #1f4870; --placeholder-color: #89a0c0;
            --modal-bg: white; --modal-text: #1f2937; --modal-item-bg: #eef3ff;
        }
        body.dark {
            --bg-start: #1a202c; --bg-end: #2d3748; --card-bg: #2d3748; --card-border: #4a5568;
            --text-primary: #f7fafc; --text-secondary: #cbd5e0; --text-soft: #a0aec0;
            --def-color: #e2e8f0; --example-border: #718096; --btn-primary-bg: #4a6fa5;
            --btn-primary-hover: #2c5282; --btn-outline-border: #4a5568; --btn-outline-color: #cbd5e0;
            --chip-bg: #2d3748; --chip-color: #cbd5e0; --placeholder-color: #a0aec0;
            --modal-bg: #2d3748; --modal-text: #f7fafc; --modal-item-bg: #4a5568;
        }
        body { font-family: system-ui, 'Inter', sans-serif; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); min-height: 100vh; padding: 1rem; transition: background 0.3s; color: var(--text-primary); }
        .master-card { max-width: 950px; margin: 0 auto; background: var(--card-bg); border-radius: 56px; overflow: hidden; border: 1px solid var(--card-border); }
        .header { padding: 1rem 1.2rem 0.6rem; text-align: center; border-bottom: 1px solid var(--card-border); }
        .header h1 { font-size: 1.8rem; background: linear-gradient(120deg, #1E2F5E, #2B4F8C); background-clip: text; -webkit-background-clip: text; color: transparent; }
        body.dark .header h1 { background: linear-gradient(120deg, #90cdf4, #63b3ed); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .control-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 8px 12px; background: rgba(0,0,0,0.02); border-bottom: 1px solid var(--card-border); align-items: center; }
        .ctrl-btn, .search-area, .lesson-selector, .accent-selector { background: var(--chip-bg); border: none; padding: 5px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 500; color: var(--chip-color); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .font-slider { display: flex; align-items: center; gap: 6px; background: var(--chip-bg); padding: 4px 12px; border-radius: 40px; }
        #fontRange { width: 80px; }
        .search-area input { background: transparent; border: none; outline: none; color: var(--text-primary); width: 120px; font-size: 0.7rem; }
        .lesson-selector select, .accent-selector select { background: transparent; border: none; color: var(--chip-color); font-weight: 500; outline: none; font-size: 0.7rem; }
        .word-zone { padding: 1rem 1rem 0.3rem; text-align: center; }
        .word-paper { background: var(--card-bg); border-radius: 48px; padding: 1.2rem 0.8rem; border: 1px solid var(--card-border); }
        .en-word { font-size: 2.5rem; font-weight: 800; color: var(--text-primary); word-break: break-word; }
        .phonetic-txt { background: var(--chip-bg); display: inline-block; padding: 0.1rem 1rem; border-radius: 40px; font-size: 0.7rem; margin-top: 6px; }
        .word-counter { margin-top: 8px; font-size: 0.7rem; background: var(--chip-bg); display: inline-block; padding: 2px 10px; border-radius: 30px; }
        .mastery-stars { display: flex; justify-content: center; gap: 6px; margin: 8px 0 4px; }
        .star { font-size: 1.3rem; cursor: pointer; color: #ccc; transition: 0.1s; }
        .star.active { color: #f5b042; }
        body.dark .star.active { color: #fbbf24; }
        .meaning-panel { padding: 0.2rem 1rem 0.8rem; }
        .meaning-card { background: var(--card-bg); border-radius: 32px; padding: 0.8rem; border: 1px solid var(--card-border); }
        .def-ch { font-size: 1rem; font-weight: 700; color: var(--def-color); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .example-en { color: var(--text-secondary); border-left: 3px solid var(--example-border); padding-left: 0.8rem; margin-top: 8px; font-size: 0.8rem; }
        .spell-area { margin-top: 10px; display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .spell-input { flex: 2; min-width: 140px; padding: 6px 12px; border-radius: 60px; border: 1px solid var(--btn-outline-border); background: var(--card-bg); color: var(--text-primary); font-size: 0.8rem; }
        .btn-group, .nav-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; padding: 0.2rem 1rem 0.6rem; }
        .btn { border: none; background: white; padding: 0.4rem 0.9rem; border-radius: 50px; font-weight: 600; font-size: 0.75rem; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: 0.2s; }
        .btn-primary { background: var(--btn-primary-bg); color: white; }
        .btn-primary:hover { background: var(--btn-primary-hover); transform: translateY(-1px);}
        .btn-outline { background: transparent; border: 1px solid var(--btn-outline-border); color: var(--btn-outline-color);}
        .btn-outline:hover { background: var(--chip-bg); }
        .btn-speak { background: var(--chip-bg); color: var(--chip-color);}
        .stats-area { padding: 0 1rem 1rem; display: flex; flex-wrap: wrap; gap: 12px; }
        .chart-container { flex: 2; min-width: 160px; background: var(--card-bg); border-radius: 28px; padding: 8px; border: 1px solid var(--card-border);}
        .wrong-words { flex: 1; min-width: 140px; background: var(--card-bg); border-radius: 28px; padding: 8px; border: 1px solid var(--card-border); max-height: 200px; overflow-y: auto; }
        .wrong-words h4 { font-size: 0.8rem; margin-bottom: 5px; }
        .wrong-list { font-size: 0.7rem; list-style: none; }
        .wrong-list li { padding: 3px 0; border-bottom: 1px solid var(--card-border); cursor: pointer; }
        .footer-note { text-align: center; font-size: 0.6rem; padding: 0.5rem; color: var(--text-soft); border-top: 1px solid var(--card-border);}
        .auto-speak-toggle { display: flex; align-items: center; gap: 5px; background: var(--chip-bg); border-radius: 30px; padding: 3px 10px; }
        .auto-speak-toggle label { font-size: 0.7rem; cursor: pointer; }
        .auto-play-control { display: flex; align-items: center; gap: 8px; background: var(--chip-bg); border-radius: 30px; padding: 3px 12px; }
        .auto-play-control label { font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .auto-play-control select { background: transparent; border: none; color: var(--chip-color); font-weight: 500; outline: none; font-size: 0.7rem; margin-left: 4px; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: var(--modal-bg); color: var(--modal-text); width: 90%; max-width: 500px; max-height: 80%; border-radius: 32px; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; }
        .modal-content h3 { margin-bottom: 12px; font-size: 1.2rem; }
        .word-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
        .word-list-item { background: var(--modal-item-bg); padding: 6px 10px; border-radius: 30px; text-align: center; cursor: pointer; font-size: 0.8rem; transition: 0.1s; color: var(--modal-text); }
        .word-list-item:hover { background: var(--btn-primary-bg); color: white; }
        .close-modal { float: right; font-size: 1.3rem; cursor: pointer; margin-bottom: 8px; align-self: flex-end; }
        body.dark .word-list-item { color: white; }
        @media (max-width: 650px) {
            .en-word { font-size: 2rem; }
            .btn { padding: 0.3rem 0.7rem; font-size: 0.65rem; }
            .control-bar { gap: 6px; }
            .search-area input { width: 90px; }
            .word-list { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
        }
    </style>
</head>
<body>
<div class="master-card">
    <div class="header">
        <h1><i class="fas fa-layer-group"></i> 高频词汇本 · 自动轮播学习</h1>
    </div>
    <div class="control-bar">
        <button id="darkModeBtn" class="ctrl-btn"><i class="fas fa-moon"></i> 深色</button>
        <div class="font-slider"><i class="fas fa-font"></i><input type="range" id="fontRange" min="0.8" max="1.5" step="0.05" value="1"></div>
        <button id="modeSwitchBtn" class="ctrl-btn"><i class="fas fa-exchange-alt"></i> 拼写模式</button>
        <button id="reviewWrongBtn" class="ctrl-btn"><i class="fas fa-book"></i> 复习错题本</button>
        <button id="wordListBtn" class="ctrl-btn"><i class="fas fa-list"></i> 单词列表</button>
        <div class="auto-play-control">
            <label><i class="fas fa-play-circle"></i> 自动轮播
                <input type="checkbox" id="autoPlayCheckbox" checked>
            </label>
            <select id="autoPlayIntervalSelect">
                <option value="3000">3秒</option>
                <option value="5000" selected>5秒</option>
                <option value="8000">8秒</option>
                <option value="10000">10秒</option>
            </select>
        </div>
        <div class="auto-speak-toggle">
            <i class="fas fa-volume-up"></i>
            <label><input type="checkbox" id="autoSpeakCheckbox" checked> 自动发音</label>
        </div>
        <div class="accent-selector">
            <i class="fas fa-language"></i>
            <select id="autoAccentSelect">
                <option value="en-US" selected>🇺🇸 美式</option>
                <option value="en-GB">🇬🇧 英式</option>
            </select>
        </div>
        <div class="lesson-selector">
            <i class="fas fa-bookmark"></i>
            <select id="lessonSelect"></select>
        </div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="查单词...">
            <button id="searchBtn"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="word-zone">
        <div class="word-paper">
            <div class="en-word" id="currentWord">加载中...</div>
            <div class="phonetic-txt" id="currentPhonetic">/ˈhaɪ friːkwənsi/</div>
            <div class="word-counter" id="counterText"></div>
            <div class="mastery-stars" id="masteryStars">
                <span class="star" data-score="1">☆</span><span class="star" data-score="2">☆</span><span class="star" data-score="3">☆</span><span class="star" data-score="4">☆</span><span class="star" data-score="5">☆</span>
            </div>
            <div id="reviewHint" style="font-size:0.65rem; margin-top:4px; color:var(--text-soft);"></div>
        </div>
    </div>

    <div class="meaning-panel">
        <div class="meaning-card">
            <div id="meaningPlaceholder" class="placeholder-tip" style="display:none;"><i class="fas fa-lightbulb"></i> 点击「显示释义」或开启拼写模式</div>
            <div id="meaningReal" style="display:block;">
                <div class="def-ch"><i class="fas fa-bookmark"></i> <span id="chineseDef"></span></div>
                <div class="example-en"><i class="fas fa-quote-right"></i> <span id="exampleSent">请用该词造句练习</span></div>
            </div>
            <div id="spellModeArea" style="display:none;">
                <div class="def-ch"><span id="spellQuestion"></span></div>
                <div class="spell-area">
                    <input type="text" id="spellInput" class="spell-input" placeholder="输入英文单词...">
                    <button id="checkSpellBtn" class="btn btn-outline">检查</button>
                </div>
                <div id="spellFeedback" class="spell-feedback"></div>
                <button id="revealAnswerBtn" class="btn btn-outline" style="margin-top:6px;">显示答案</button>
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button id="revealBtn" class="btn btn-primary" style="display:none;"><i class="fas fa-eye"></i> 显示释义</button>
        <button id="speakUkBtn" class="btn btn-speak"><i class="fas fa-flag-checkered"></i> 英式发音</button>
        <button id="speakUsBtn" class="btn btn-speak"><i class="fas fa-flag-usa"></i> 美式发音</button>
        <button id="pronounceAccuracyBtn" class="btn btn-outline"><i class="fas fa-microphone"></i> 发音测测</button>
    </div>

    <div class="nav-row">
        <button id="prevBtn" class="btn btn-outline"><i class="fas fa-arrow-left"></i> 上一个</button>
        <button id="nextBtn" class="btn btn-outline">下一个 <i class="fas fa-arrow-right"></i></button>
    </div>

    <div class="stats-area">
        <div class="chart-container"><canvas id="studyChart" width="260" height="120"></canvas></div>
        <div class="wrong-words"><h4><i class="fas fa-eraser"></i> 错题本/生词本</h4><ul id="wrongList" class="wrong-list"><li>暂无错词</li></ul></div>
    </div>
    <div class="footer-note"><i class="fas fa-arrows-alt"></i> 手势滑动切词 | 星级掌握度 | 拼写自动记错 | 自动轮播默认开启 | 双模式自动发音</div>
</div>

<div id="wordListModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeWordListBtn">&times;</span>
        <h3 id="modalLessonTitle">📖 单词列表</h3>
        <div id="wordListContainer" class="word-list"></div>
    </div>
</div>

<script>

// ============================================================

let allWords = [];
for (let lesson in wordsByLesson) {
    for (let [word, meaning] of wordsByLesson[lesson]) {
        allWords.push({ word: word.toLowerCase(), meaning: meaning, lesson: parseInt(lesson), example: `请用“${word}”造句练习` });
    }
}
console.log(`总单词数: ${allWords.length}`);

// ------------------- 全局变量 -------------------
let currentDisplayWords = [...allWords];
let currentIndex = 0;
let spellMode = false;
let autoSpeakEnabled = true;
let autoAccent = 'en-US';
let autoPlayEnabled = true;   // 默认开启自动轮播
let autoPlayTimer = null;
let autoPlayIntervalMs = 5000; // 默认5秒

// localStorage 学习数据
const STORAGE = { MASTERY: 'final_pdf_mastery', WRONG: 'final_pdf_wrong', STUDY_LOG: 'final_pdf_study_log', LAST_REVIEW: 'final_pdf_last_review' };
let mastery = JSON.parse(localStorage.getItem(STORAGE.MASTERY)) || {};
let wrongList = JSON.parse(localStorage.getItem(STORAGE.WRONG)) || [];
let studyLog = JSON.parse(localStorage.getItem(STORAGE.STUDY_LOG)) || {};
let lastReview = JSON.parse(localStorage.getItem(STORAGE.LAST_REVIEW)) || {};

const EBBINGHAUS = [1, 2, 4, 7, 15, 30];
function todayStr() { return new Date().toISOString().slice(0,10); }
function logStudy() { let date = todayStr(); studyLog[date] = (studyLog[date] || 0) + 1; localStorage.setItem(STORAGE.STUDY_LOG, JSON.stringify(studyLog)); updateChart(); }

function updateWrongListUI() {
    let container = document.getElementById('wrongList');
    if(!wrongList.length) { container.innerHTML = '<li>暂无错词，加油！</li>'; return; }
    container.innerHTML = wrongList.map(word => `<li data-word="${word}">${word}</li>`).join('');
    document.querySelectorAll('#wrongList li').forEach(li => {
        li.addEventListener('click', () => { let w = li.dataset.word; let idx = currentDisplayWords.findIndex(item=>item.word===w); if(idx!==-1) { currentIndex=idx; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); else showMeaningArea(); resetAutoPlayTimer(); } });
    });
}
function addToWrongList(word) { if(!wrongList.includes(word)) { wrongList.push(word); localStorage.setItem(STORAGE.WRONG, JSON.stringify(wrongList)); updateWrongListUI(); } }
function removeFromWrongList(word) { wrongList = wrongList.filter(w => w !== word); localStorage.setItem(STORAGE.WRONG, JSON.stringify(wrongList)); updateWrongListUI(); }

function updateMasteryStars() {
    let currentWord = currentDisplayWords[currentIndex]?.word;
    if(!currentWord) return;
    let score = mastery[currentWord] || 1;
    for(let i=1;i<=5;i++){ let star = document.querySelector(`.star[data-score='${i}']`); if(i <= score) { star.innerHTML = '★'; star.classList.add('active'); } else { star.innerHTML = '☆'; star.classList.remove('active'); } }
    let last = lastReview[currentWord];
    if(last){ let daysPassed = Math.floor((Date.now() - last) / (1000*3600*24)); let nextInterval = EBBINGHAUS.find(interval => interval > daysPassed); if(nextInterval) document.getElementById('reviewHint').innerHTML = `📅 建议 ${nextInterval - daysPassed} 天后复习 (艾宾浩斯)`; else document.getElementById('reviewHint').innerHTML = `✅ 已熟练掌握，继续巩固`; }
    else { document.getElementById('reviewHint').innerHTML = `⭐ 点击星级标记掌握度`; }
}
function setMastery(score) { let w = currentDisplayWords[currentIndex]?.word; if(!w) return; mastery[w] = score; localStorage.setItem(STORAGE.MASTERY, JSON.stringify(mastery)); lastReview[w] = Date.now(); localStorage.setItem(STORAGE.LAST_REVIEW, JSON.stringify(lastReview)); logStudy(); updateMasteryStars(); }
document.querySelectorAll('.star').forEach(star => { star.addEventListener('click', (e) => { let score = parseInt(star.dataset.score); setMastery(score); }); });

let chart;
function updateChart() {
    let labels = [], data = [];
    let now = new Date();
    for(let i=6; i>=0; i--){ let d = new Date(now); d.setDate(now.getDate()-i); let ds = d.toISOString().slice(0,10); labels.push(ds.slice(5)); data.push(studyLog[ds] || 0); }
    if(chart) chart.destroy();
    let ctx = document.getElementById('studyChart').getContext('2d');
    chart = new Chart(ctx, { type:'line', data:{ labels, datasets:[{ label:'每日学习单词数', data, borderColor:'#2c4c7c', tension:0.2 }] } });
}

function hideMeaningAndShowSpell() {
    if(!currentDisplayWords[currentIndex]) return;
    const w = currentDisplayWords[currentIndex];
    document.getElementById('meaningPlaceholder').style.display = 'none';
    document.getElementById('meaningReal').style.display = 'none';
    document.getElementById('spellModeArea').style.display = 'block';
    document.getElementById('spellQuestion').innerHTML = `<i class="fas fa-question-circle"></i> 中文释义: ${w.meaning}`;
    document.getElementById('spellInput').value = '';
    document.getElementById('spellFeedback').innerHTML = '';
    document.getElementById('revealBtn').disabled = true;
}
function showMeaningArea() {
    document.getElementById('meaningPlaceholder').style.display = 'none';
    document.getElementById('meaningReal').style.display = 'block';
    document.getElementById('spellModeArea').style.display = 'none';
    document.getElementById('revealBtn').disabled = false;
}
function toggleSpellMode() {
    spellMode = !spellMode;
    if(spellMode) hideMeaningAndShowSpell();
    else showMeaningArea();
    document.getElementById('modeSwitchBtn').innerHTML = spellMode ? '<i class="fas fa-eye"></i> 闪卡模式' : '<i class="fas fa-exchange-alt"></i> 拼写模式';
}
function checkSpell() {
    if(!currentDisplayWords[currentIndex]) return;
    let user = document.getElementById('spellInput').value.trim().toLowerCase();
    let correct = currentDisplayWords[currentIndex].word.toLowerCase();
    if(user === correct) {
        document.getElementById('spellFeedback').innerHTML = '<span style="color:green;">✅ 完全正确！已从错题本移除（如有）</span>';
        removeFromWrongList(correct);
        let cur = mastery[correct] || 1;
        if(cur < 5) setMastery(cur+1);
    } else {
        document.getElementById('spellFeedback').innerHTML = `<span style="color:#e53e3e;">❌ 错误！正确答案: ${correct}，已加入错题本</span>`;
        addToWrongList(correct);
        let cur = mastery[correct] || 1;
        if(cur > 1) setMastery(cur-1);
    }
}
function revealAnswer() { if(currentDisplayWords[currentIndex]) document.getElementById('spellFeedback').innerHTML = `🔎 正确答案: ${currentDisplayWords[currentIndex].word}`; }

function speak(lang) { 
    if(!currentDisplayWords[currentIndex]) return; 
    let utterance = new SpeechSynthesisUtterance(currentDisplayWords[currentIndex].word); 
    utterance.lang = lang; 
    speechSynthesis.cancel(); 
    speechSynthesis.speak(utterance); 
}

let recognition;
function initRecognition() { if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { alert("不支持语音识别"); return null; } const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition; let rec = new SpeechRecognition(); rec.lang = 'en-US'; rec.interimResults = false; rec.maxAlternatives = 1; return rec; }
function pronounceAccuracy() { if(!recognition) recognition = initRecognition(); if(!recognition) return; recognition.start(); recognition.onresult = (event) => { let spoken = event.results[0][0].transcript.toLowerCase().trim(); let target = currentDisplayWords[currentIndex]?.word.toLowerCase() || ''; if(spoken === target) alert(`🎉 完美！`); else if(spoken.includes(target) || target.includes(spoken)) alert(`👍 接近正确！ (你说: ${spoken})`); else alert(`❌ 发音有误，正确: ${target} (你说: ${spoken})`); }; recognition.onerror = () => alert("请检查麦克风权限"); }

// 自动轮播控制
function startAutoPlay() {
    if (autoPlayTimer) clearInterval(autoPlayTimer);
    if (!autoPlayEnabled) return;
    autoPlayTimer = setInterval(() => {
        if (autoPlayEnabled && currentDisplayWords.length) {
            nextWord();
        }
    }, autoPlayIntervalMs);
}
function stopAutoPlay() {
    if (autoPlayTimer) {
        clearInterval(autoPlayTimer);
        autoPlayTimer = null;
    }
}
function setAutoPlay(enable) {
    autoPlayEnabled = enable;
    if (enable) startAutoPlay();
    else stopAutoPlay();
}
function resetAutoPlayTimer() {
    if (autoPlayEnabled) {
        if (autoPlayTimer) {
            clearInterval(autoPlayTimer);
            autoPlayTimer = setInterval(() => {
                if (autoPlayEnabled && currentDisplayWords.length) {
                    nextWord();
                }
            }, autoPlayIntervalMs);
        }
    }
}
function stopAutoPlayIfNeeded() {
    if (autoPlayEnabled) resetAutoPlayTimer();
}

function updateWordUI() {
    if(!currentDisplayWords.length) return;
    const w = currentDisplayWords[currentIndex];
    document.getElementById('currentWord').innerHTML = w.word;
    document.getElementById('currentPhonetic').innerHTML = `Lesson ${w.lesson}`;
    document.getElementById('counterText').innerHTML = `第${currentIndex+1} / ${currentDisplayWords.length}词`;
    if(!spellMode){
        document.getElementById('chineseDef').innerHTML = w.meaning;
        document.getElementById('exampleSent').innerHTML = w.example;
        document.getElementById('meaningPlaceholder').style.display = 'none';
        document.getElementById('meaningReal').style.display = 'block';
    } else {
        if(document.getElementById('spellModeArea').style.display === 'block') {
            document.getElementById('spellQuestion').innerHTML = `<i class="fas fa-question-circle"></i> 中文释义: ${w.meaning}`;
        }
    }
    updateMasteryStars();
    if(autoSpeakEnabled) {
        speak(autoAccent);
    }
    // 重置自动轮播计时器（让当前单词停留完整间隔）
    if (autoPlayEnabled) resetAutoPlayTimer();
}

function nextWord() { if(currentDisplayWords.length===0) return; currentIndex = (currentIndex+1)%currentDisplayWords.length; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); else showMeaningArea(); }
function prevWord() { if(currentDisplayWords.length===0) return; currentIndex = (currentIndex-1+currentDisplayWords.length)%currentDisplayWords.length; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); else showMeaningArea(); }

// Lesson 下拉选择
const lessonSelect = document.getElementById('lessonSelect');
function populateLessonSelect() {
    let lessons = Object.keys(wordsByLesson).map(Number).sort((a,b)=>a-b);
    lessonSelect.innerHTML = '<option value="all">全部单词</option>';
    lessons.forEach(ls => {
        let option = document.createElement('option');
        option.value = ls;
        option.textContent = `Lesson ${ls}`;
        lessonSelect.appendChild(option);
    });
}
function filterByLesson(lesson) {
    if(lesson === 'all') {
        currentDisplayWords = [...allWords];
    } else {
        currentDisplayWords = allWords.filter(w => w.lesson == lesson);
        if(currentDisplayWords.length === 0) { alert(`Lesson ${lesson} 无单词`); return; }
    }
    currentIndex = 0;
    updateWordUI();
    if(spellMode) hideMeaningAndShowSpell();
    else showMeaningArea();
    resetAutoPlayTimer(); // 重置轮播计时器
}
lessonSelect.addEventListener('change', (e) => { filterByLesson(e.target.value); });
populateLessonSelect();

function performSearch() {
    let keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    if(!keyword) { alert("请输入单词"); return; }
    let idx = currentDisplayWords.findIndex(w => w.word === keyword);
    if(idx !== -1) { currentIndex = idx; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); else showMeaningArea(); resetAutoPlayTimer(); }
    else { alert(`未找到单词“${keyword}”`); }
}
document.getElementById('searchBtn').addEventListener('click', performSearch);
document.getElementById('searchInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') performSearch(); });

const autoAccentSelect = document.getElementById('autoAccentSelect');
autoAccentSelect.addEventListener('change', (e) => { autoAccent = e.target.value; });

const wordListModal = document.getElementById('wordListModal');
const wordListContainer = document.getElementById('wordListContainer');
const modalLessonTitle = document.getElementById('modalLessonTitle');
const closeWordListBtn = document.getElementById('closeWordListBtn');
const wordListBtn = document.getElementById('wordListBtn');

function openWordList() {
    const selectedLesson = lessonSelect.value;
    let title = '';
    let wordsToShow = [];
    if (selectedLesson === 'all') {
        title = '📖 全部单词列表';
        wordsToShow = allWords;
    } else {
        title = `📖 Lesson ${selectedLesson} 单词列表`;
        wordsToShow = allWords.filter(w => w.lesson == selectedLesson);
    }
    modalLessonTitle.innerText = title;
    wordListContainer.innerHTML = '';
    wordsToShow.forEach(w => {
        const wordDiv = document.createElement('div');
        wordDiv.className = 'word-list-item';
        wordDiv.innerText = w.word;
        wordDiv.addEventListener('click', () => {
            const idx = currentDisplayWords.findIndex(item => item.word === w.word);
            if (idx !== -1) {
                currentIndex = idx;
                updateWordUI();
                if (spellMode) hideMeaningAndShowSpell();
                else showMeaningArea();
                resetAutoPlayTimer();
            } else {
                if (selectedLesson !== 'all' && lessonSelect.value != w.lesson) {
                    lessonSelect.value = w.lesson;
                    filterByLesson(w.lesson);
                }
                const newIdx = currentDisplayWords.findIndex(item => item.word === w.word);
                if (newIdx !== -1) currentIndex = newIdx;
                updateWordUI();
                if (spellMode) hideMeaningAndShowSpell();
                else showMeaningArea();
                resetAutoPlayTimer();
            }
            wordListModal.style.display = 'none';
        });
        wordListContainer.appendChild(wordDiv);
    });
    wordListModal.style.display = 'flex';
}
wordListBtn.addEventListener('click', openWordList);
closeWordListBtn.addEventListener('click', () => { wordListModal.style.display = 'none'; });
window.addEventListener('click', (e) => { if (e.target === wordListModal) wordListModal.style.display = 'none'; });

document.getElementById('speakUsBtn').addEventListener('click', ()=>speak('en-US'));
document.getElementById('prevBtn').addEventListener('click', () => { prevWord(); resetAutoPlayTimer(); });
document.getElementById('nextBtn').addEventListener('click', () => { nextWord(); resetAutoPlayTimer(); });
document.getElementById('darkModeBtn').addEventListener('click', toggleDark);
document.getElementById('modeSwitchBtn').addEventListener('click', toggleSpellMode);
document.getElementById('checkSpellBtn').addEventListener('click', checkSpell);
document.getElementById('revealAnswerBtn').addEventListener('click', revealAnswer);
document.getElementById('pronounceAccuracyBtn').addEventListener('click', pronounceAccuracy);
document.getElementById('reviewWrongBtn').addEventListener('click', () => { if(wrongList.length) { let w = wrongList[0]; let idx = currentDisplayWords.findIndex(item=>item.word===w); if(idx!==-1) { currentIndex=idx; updateWordUI(); if(spellMode) hideMeaningAndShowSpell(); else showMeaningArea(); resetAutoPlayTimer(); } } });
document.getElementById('autoSpeakCheckbox').addEventListener('change', (e) => { autoSpeakEnabled = e.target.checked; });

const autoPlayIntervalSelect = document.getElementById('autoPlayIntervalSelect');

autoPlayCheckbox.addEventListener('change', (e) => { setAutoPlay(e.target.checked); });
autoPlayIntervalSelect.addEventListener('change', (e) => { autoPlayIntervalMs = parseInt(e.target.value); if (autoPlayEnabled) { setAutoPlay(true); } });

function toggleDark(){ document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }
if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
let fontRange = document.getElementById('fontRange');
fontRange.addEventListener('input', (e)=>{ let size = e.target.value; document.querySelector('.en-word').style.fontSize = `${size*2.2}rem`; });

let touchStartX = 0;
document.querySelector('.master-card').addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
document.querySelector('.master-card').addEventListener('touchend', (e) => { let endX = e.changedTouches[0].screenX; if(endX - touchStartX > 50) { prevWord(); resetAutoPlayTimer(); } else if(touchStartX - endX > 50) { nextWord(); resetAutoPlayTimer(); } });

window.addEventListener('keydown', (e)=>{
    if(e.key === 'ArrowLeft'){ prevWord(); resetAutoPlayTimer(); e.preventDefault(); }
    else if(e.key === 'ArrowRight'){ nextWord(); resetAutoPlayTimer(); e.preventDefault(); }
});

updateWordUI();
updateWrongListUI();
updateChart();

setAutoPlay(true);
